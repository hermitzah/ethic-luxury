<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration · Islamic Shariah Validator</title>

    <!-- Google Fonts + FontAwesome (comme index.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ============================================================
           CSS – Styles pour la page d'administration
           ============================================================ */
        :root {
            --primary: #1a3a3a;
            --primary-light: #2a5a5a;
            --accent: #c9a86c;
            --accent-light: #e8d5b0;
            --bg-light: #f8f6f1;
            --bg-white: #ffffff;
            --text-dark: #1e2a2a;
            --text-muted: #5a6a6a;
            --border-color: #dce4e4;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --transition: 0.25s ease;
            --danger: #b33a3a;
            --success: #1a7a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 2rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }
        .logo h1 i {
            color: var(--accent);
            margin-right: 0.5rem;
        }
        .logo span {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.95rem;
            display: block;
            margin-top: 0.1rem;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .header-actions a {
            text-decoration: none;
            color: var(--text-dark);
            background: var(--bg-white);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .header-actions a:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }

        /* Status messages */
        .msg {
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 500;
        }
        .msg.success {
            background: #e1f5e8;
            color: var(--success);
            display: block;
        }
        .msg.error {
            background: #fde8e8;
            color: var(--danger);
            display: block;
        }
        .msg.info {
            background: #e3edfa;
            color: #1a4a7a;
            display: block;
        }

        /* Card */
        .card {
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
        }
        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .card .sub {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .form-group .hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-light);
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(201, 168, 108, 0.2);
        }

        input[type="number"] {
            width: auto;
            max-width: 120px;
        }
        input[type="range"] {
            width: 200px;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        /* Tags (industries) */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem 0.2rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-light);
            min-height: 48px;
            align-items: center;
            padding: 0.5rem 0.7rem;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
            font-size: 0.85rem;
            gap: 0.5rem;
        }
        .tag .remove {
            cursor: pointer;
            font-weight: 700;
            opacity: 0.7;
            transition: var(--transition);
        }
        .tag .remove:hover {
            opacity: 1;
        }
        .tag-input {
            border: none;
            background: transparent;
            padding: 0.25rem 0.5rem;
            font-size: 0.9rem;
            font-family: inherit;
            flex: 1 1 120px;
            min-width: 80px;
            outline: none;
        }
        .tag-input::placeholder {
            color: var(--text-muted);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding-top: 0.3rem;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }
        .btn:hover {
            background: var(--primary-light);
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(26, 58, 58, 0.2);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--bg-light);
            box-shadow: var(--shadow);
            transform: none;
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: #8a2a2a;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            align-items: center;
        }
        .action-bar .spacer {
            flex: 1;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .footer a {
            color: var(--text-dark);
            text-decoration: none;
            border-bottom: 1px dotted transparent;
        }
        .footer a:hover {
            border-bottom-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 700px) {
            .card {
                padding: 1.5rem;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .header-actions {
                width: 100%;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-bar .spacer {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1><i class="fas fa-cog"></i>Administration</h1>
            <span>Paramètres Shariah · Islamic Shariah Validator</span>
        </div>
        <div class="header-actions">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Retour</a>
            <a href="https://gitlab.com/ethikluxry/islamic_shariah_validator" target="_blank">
                <i class="fab fa-gitlab"></i>
            </a>
        </div>
    </header>

    <!-- MESSAGES -->
    <div id="msg" class="msg"></div>

    <!-- CONFIGURATION CARD -->
    <div class="card" id="configCard">
        <h2><i class="fas fa-sliders-h" style="color:var(--accent);"></i> Paramètres de validation</h2>
        <p class="sub">Modifiez les règles Shariah appliquées par le validateur. Les changements sont stockés dans le ledger Fabric.</p>

        <form id="configForm" autocomplete="off">

            <!-- Seuil Gharar -->
            <div class="form-group">
                <label>Seuil de Gharar <span class="hint">(incertitude maximale autorisée)</span></label>
                <div>
                    <input type="range" id="ghararThreshold" min="0" max="1" step="0.01" value="0.15" />
                    <input type="number" id="ghararThresholdNum" min="0" max="1" step="0.01" value="0.15" style="width:80px;" />
                </div>
            </div>

            <!-- Ratios de profit -->
            <div class="form-row">
                <div class="form-group">
                    <label>Part du gestionnaire <span class="hint">(Mudarabah/Musharakah)</span></label>
                    <input type="number" id="managerShare" class="form-control" min="0" max="1" step="0.01" value="0.3" />
                </div>
                <div class="form-group">
                    <label>Part de l'investisseur <span class="hint">(doit compléter à 1.0)</span></label>
                    <input type="number" id="investorShare" class="form-control" min="0" max="1" step="0.01" value="0.7" />
                </div>
            </div>

            <!-- Industries Halal -->
            <div class="form-group">
                <label>Industries Halal <span class="hint">(autorité de validation)</span></label>
                <div class="tag-container" id="halalTagsContainer">
                    <input type="text" class="tag-input" id="halalInput" placeholder="Ajouter une industrie…" />
                </div>
            </div>

            <!-- Industries Haram -->
            <div class="form-group">
                <label>Industries Haram <span class="hint">(interdites)</span></label>
                <div class="tag-container" id="haramTagsContainer">
                    <input type="text" class="tag-input" id="haramInput" placeholder="Ajouter une industrie…" />
                </div>
            </div>

            <!-- Options -->
            <div class="form-group">
                <label>Vérifications actives</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="enableAmbiguity" checked />
                        Vérifier les clauses ambiguës
                    </label>
                    <label>
                        <input type="checkbox" id="enableAssetBacking" checked />
                        Vérifier l'adossement à un actif
                    </label>
                </div>
            </div>

            <!-- Actions -->
            <div class="action-bar">
                <button type="button" class="btn" id="saveBtn"><i class="fas fa-save"></i> Enregistrer</button>
                <button type="button" class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Réinitialiser</button>
                <span class="spacer"></span>
                <button type="button" class="btn btn-secondary" id="loadBtn"><i class="fas fa-sync-alt"></i> Recharger</button>
            </div>
        </form>
    </div>

    <!-- STATUT (info sur la dernière mise à jour) -->
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:1rem; font-size:0.9rem; color:var(--text-muted); padding:0 0.5rem;">
        <span id="lastUpdate"><i class="far fa-clock"></i> Dernière mise à jour : <span id="lastUpdateTime">—</span></span>
        <span id="versionInfo"><i class="fas fa-code-branch"></i> Config v0.1.0</span>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        &copy; 2026 <a href="mailto:abdelhakimzouai@gmail.com">AbdElHakim ZOUAÏ</a> &middot; Licence <strong>DWPL‑2.0</strong>
    </footer>
</div>

<!-- ============================================================
     JAVASCRIPT – Logique de l'interface d'administration
     ============================================================ -->
<script>
    (function() {
        'use strict';

        // ------------------------------------------------------------------
        // 1. Références DOM
        // ------------------------------------------------------------------
        const msgEl = document.getElementById('msg');

        const ghararRange = document.getElementById('ghararThreshold');
        const ghararNum   = document.getElementById('ghararThresholdNum');
        const managerShare = document.getElementById('managerShare');
        const investorShare = document.getElementById('investorShare');
        const enableAmbiguity = document.getElementById('enableAmbiguity');
        const enableAssetBacking = document.getElementById('enableAssetBacking');

        const halalContainer = document.getElementById('halalTagsContainer');
        const haramContainer = document.getElementById('haramTagsContainer');
        const halalInput = document.getElementById('halalInput');
        const haramInput = document.getElementById('haramInput');

        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loadBtn = document.getElementById('loadBtn');
        const lastUpdateTime = document.getElementById('lastUpdateTime');

        // ------------------------------------------------------------------
        // 2. Gestion des tags (ajout / suppression)
        // ------------------------------------------------------------------

        // Ajoute un tag dans le conteneur
        function addTag(container, input, value) {
            if (!value || value.trim() === '') return;
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerHTML = `${value.trim()} <span class="remove" data-value="${value.trim()}">&times;</span>`;
            // Insérer avant le champ input
            container.insertBefore(tag, input);
        }

        // Récupère tous les tags d'un conteneur (sous forme de tableau)
        function getTags(container) {
            const tags = [];
            container.querySelectorAll('.tag').forEach(el => {
                const text = el.textContent.replace('×', '').trim();
                if (text) tags.push(text);
            });
            return tags;
        }

        // Initialise un conteneur avec une liste de tags
        function setTags(container, input, values) {
            // Supprimer tous les tags existants
            container.querySelectorAll('.tag').forEach(el => el.remove());
            // Ajouter chaque valeur
            values.forEach(v => addTag(container, input, v));
        }

        // Gestion des événements pour l'ajout de tags
        function setupTagInput(container, input) {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = this.value.trim();
                    if (val) {
                        addTag(container, input, val);
                        this.value = '';
                    }
                }
            });
            input.addEventListener('blur', function() {
                const val = this.value.trim();
                if (val) {
                    addTag(container, input, val);
                    this.value = '';
                }
            });
            // Supprimer un tag via le clic sur la croix
            container.addEventListener('click', function(e) {
                if (e.target.classList.contains('remove')) {
                    const tagEl = e.target.closest('.tag');
                    if (tagEl) tagEl.remove();
                }
            });
        }

        // Initialiser les deux conteneurs
        setupTagInput(halalContainer, halalInput);
        setupTagInput(haramContainer, haramInput);

        // ------------------------------------------------------------------
        // 3. Synchronisation slider / input numérique
        // ------------------------------------------------------------------
        ghararRange.addEventListener('input', function() {
            ghararNum.value = this.value;
        });
        ghararNum.addEventListener('input', function() {
            let val = parseFloat(this.value);
            if (isNaN(val)) val = 0;
            val = Math.min(1, Math.max(0, val));
            ghararRange.value = val;
            this.value = val;
        });

        // Vérifier que les ratios de profit somment à 1.0
        function validateProfitRatios() {
            const m = parseFloat(managerShare.value) || 0;
            const i = parseFloat(investorShare.value) || 0;
            const sum = m + i;
            if (Math.abs(sum - 1.0) > 0.001) {
                // On ajuste automatiquement la part de l'investisseur
                investorShare.value = (1 - m).toFixed(2);
                return false;
            }
            return true;
        }
        managerShare.addEventListener('change', validateProfitRatios);
        investorShare.addEventListener('change', validateProfitRatios);

        // ------------------------------------------------------------------
        // 4. Récupération / Sauvegarde de la configuration (API)
        // ------------------------------------------------------------------

        // URL de base (à adapter selon votre backend)
        const API_BASE = '/api/admin'; // ou 'http://localhost:8080/api/admin'

        async function fetchConfig() {
            showMessage('Chargement de la configuration…', 'info');
            try {
                const resp = await fetch(`${API_BASE}/config`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const config = await resp.json();
                applyConfig(config);
                showMessage('Configuration chargée avec succès.', 'success');
                lastUpdateTime.textContent = new Date().toLocaleString();
            } catch (err) {
                console.warn('Impossible de charger la config distante, utilisation des valeurs par défaut.', err);
                // Fallback sur les valeurs par défaut
                applyConfig({
                    gharar_threshold: 0.15,
                    default_manager_share: 0.3,
                    default_investor_share: 0.7,
                    halal_industries: ['Food', 'Retail', 'Healthcare'],
                    haram_industries: ['Alcohol', 'Pork', 'Gambling', 'Adult Entertainment'],
                    enable_ambiguity_check: true,
                    enable_asset_backing_check: true
                });
                showMessage('Configuration par défaut chargée (mode hors‑ligne).', 'info');
            }
        }

        async function saveConfig() {
            const config = getConfigFromForm();
            // Validation
            if (config.gharar_threshold < 0 || config.gharar_threshold > 1) {
                showMessage('Le seuil de Gharar doit être entre 0 et 1.', 'error');
                return;
            }
            if (Math.abs(config.default_manager_share + config.default_investor_share - 1.0) > 0.001) {
                showMessage('Les parts de profit doivent sommer à 1.0.', 'error');
                return;
            }
            if (config.halal_industries.length === 0) {
                showMessage('Au moins une industrie Halal est requise.', 'error');
                return;
            }

            showMessage('Enregistrement en cours…', 'info');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner"></span> Enregistrement…';

            try {
                const resp = await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();
                showMessage('✅ Configuration enregistrée avec succès.', 'success');
                lastUpdateTime.textContent = new Date().toLocaleString();
            } catch (err) {
                showMessage('❌ Erreur lors de l\'enregistrement : ' + err.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Enregistrer';
            }
        }

        async function resetConfig() {
            if (!confirm('Voulez‑vous vraiment réinitialiser tous les paramètres aux valeurs par défaut ?')) return;
            showMessage('Réinitialisation…', 'info');
            try {
                const resp = await fetch(`${API_BASE}/config/reset`, { method: 'POST' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const config = await resp.json();
                applyConfig(config);
                showMessage('✅ Configuration réinitialisée avec succès.', 'success');
                lastUpdateTime.textContent = new Date().toLocaleString();
            } catch (err) {
                showMessage('❌ Erreur lors de la réinitialisation : ' + err.message, 'error');
            }
        }

        // ------------------------------------------------------------------
        // 5. Remplir / Extraire le formulaire
        // ------------------------------------------------------------------

        function applyConfig(config) {
            ghararRange.value = config.gharar_threshold || 0.15;
            ghararNum.value = config.gharar_threshold || 0.15;
            managerShare.value = config.default_manager_share || 0.3;
            investorShare.value = config.default_investor_share || 0.7;
            enableAmbiguity.checked = config.enable_ambiguity_check !== false;
            enableAssetBacking.checked = config.enable_asset_backing_check !== false;

            setTags(halalContainer, halalInput, config.halal_industries || []);
            setTags(haramContainer, haramInput, config.haram_industries || []);
        }

        function getConfigFromForm() {
            return {
                gharar_threshold: parseFloat(ghararRange.value) || 0.15,
                default_manager_share: parseFloat(managerShare.value) || 0.3,
                default_investor_share: parseFloat(investorShare.value) || 0.7,
                halal_industries: getTags(halalContainer),
                haram_industries: getTags(haramContainer),
                enable_ambiguity_check: enableAmbiguity.checked,
                enable_asset_backing_check: enableAssetBacking.checked,
            };
        }

        // ------------------------------------------------------------------
        // 6. Messages
        // ------------------------------------------------------------------
        function showMessage(text, type = 'info') {
            msgEl.textContent = text;
            msgEl.className = 'msg ' + type;
            // Auto‑masquer après 6s (sauf erreur)
            if (type !== 'error') {
                clearTimeout(window.msgTimeout);
                window.msgTimeout = setTimeout(() => {
                    msgEl.className = 'msg';
                }, 6000);
            }
        }

        // ------------------------------------------------------------------
        // 7. Événements des boutons
        // ------------------------------------------------------------------
        saveBtn.addEventListener('click', saveConfig);
        resetBtn.addEventListener('click', resetConfig);
        loadBtn.addEventListener('click', fetchConfig);

        // ------------------------------------------------------------------
        // 8. Initialisation
        // ------------------------------------------------------------------
        fetchConfig();

        console.log('🕌 Administration Shariah – interface prête.');
    })();
</script>

</body>
</html>
