openapi: 3.0.3
info:
  title: Islamic Finance Smart Contracts API (DWPL v2.0 Compliant)
  version: 1.0.0
  description: |
    Interface unifiée pour les contrats intelligents conformes à la Charia.
    
    **Licence DWPL v2.0** :
    Cette API et l'intégralité de ses contrats sous-jacents sont publiés sous la Licence Publique Waqf Décentralisée (DWPL) v2.0.
    Conformément à l'Article 3 (Clause d'Irrévocabilité), une fois déployés sur un registre immuable, ces codes deviennent un Waqf numérique perpétuel, inaliénable et libres pour l'humanité.
    URI du manifeste légal : ipfs://QmWaqfDWPLv2ManifesteComplet
    Dérivations strictement soumises aux mêmes termes.
    
    **Compléments AAOIFI** : Les règles de partage des profits, les ratios de perte et les actifs sous-jacents sont conformes aux standards du Accounting and Auditing Organization for Islamic Financial Institutions.
  contact:
    name: Islamic Finance API Team
    email: api@islamicfinance.dev
  license:
    name: DWPL v2.0 + AAOIFI Compliance
    url: https://dwpl.islamicfinance.dev/license

servers:
  - url: https://api.islamicfinance.dev/v1
    description: Production server
  - url: https://sandbox.islamicfinance.dev/v1
    description: Testing sandbox
  - url: http://localhost:8081/v1
    description: Local development

security:
  - OAuth2:
      - financial.write
      - partnership.read

paths:
  # --- CONTRATS DE PARTENARIAT ---
  /mudarabah:
    post:
      summary: Créer un contrat Mudarabah
      operationId: createMudarabah
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mudarabah'
      responses:
        '201':
          description: Contrat créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mudarabah'
    get:
      summary: Lister les Mudarabah
      operationId: listMudarabah
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, matured, terminated]
      responses:
        '200':
          description: Liste des contrats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mudarabah'
  /mudarabah/{id}:
    get:
      summary: Détail d'un Mudarabah
      operationId: getMudarabah
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
