components:
  schemas:
    # --- SCHÉMAS DE BASE ---
    Party:
      type: object
      properties:
        id:
          type: string
          example: "p_123e4567"
        name:
          type: string
          example: "AbdElHakim ZOUAÏ"
        type:
          type: string
          enum: [individual, corporate, dao]
        walletAddress:
          type: string
          example: "0xAb5801a7D398351b8bE11C439e05C5B3259aeC9B"
        role:
          type: string
          enum: [rab_ul_mal, mudarib, entrepreneur, investor, guarantor]
      required:
        - id
        - name

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Le ratio de profit ne peut excéder 90%"
        timestamp:
          type: string
          format: date-time
          example: "2026-07-07T10:30:00Z"
      required:
        - code
        - message

    # --- CONTRATS DE PARTENARIAT ---
    Mudarabah:
      type: object
      properties:
        id:
          type: string
        capitalProvider:
          $ref: '#/components/schemas/Party'
        entrepreneur:
          $ref: '#/components/schemas/Party'
        capitalAmount:
          type: number
          example: 100000.00
        profitRatio:
          type: number
          description: Part du profit pour l'entrepreneur (ex: 0.4 = 40%)
          example: 0.4
        lossProvision:
          type: string
          enum: [capital_only, profit_forfeited]
        status:
          type: string
          enum: [active, matured, terminated]
        createdAt:
          type: string
          format: date-time

    Musharakah:
      type: object
      properties:
        id:
          type: string
        partners:
          type: array
          items:
            $ref: '#/components/schemas/Party'
        totalCapital:
          type: number
          example: 500000.00
        equityShares:
          type: object
          additionalProperties:
            type: number
          example: { "p1": 0.5, "p2": 0.5 }
        profitDistributionRatio:
          type: object
          additionalProperties:
            type: number
        managementRights:
          type: object
          additionalProperties:
            type: boolean
        status:
          type: string
          enum: [active, dissolved]

    Qirad:
      allOf:
        - $ref: '#/components/schemas/Mudarabah'
        - type: object
          properties:
            tradeLicense:
              type: string
              description: Licence spécifique pour le commerce maritime

    Musaqat:
      type: object
      properties:
        id:
          type: string
        landOwner:
          $ref: '#/components/schemas/Party'
        farmer:
          $ref: '#/components/schemas/Party'
        orchardSize:
          type: number
          example: 10.5
        cropType:
          type: string
          example: "Dattes"
        harvestShare:
          type: number
          description: Part du fermier sur la récolte
          example: 0.5
        irrigationSchedule:
          type: string

    Muzaraah:
      type: object
      properties:
        id:
          type: string
        landOwner:
          $ref: '#/components/schemas/Party'
        cultivator:
          $ref: '#/components/schemas/Party'
        landArea:
          type: number
        seedsProvidedBy:
          type: string
          enum: [landowner, cultivator, both]
        produceShare:
          type: number
          description: Part du cultivateur
          example: 0.4

    Murabaha:
      type: object
      properties:
        id:
          type: string
        seller:
          $ref: '#/components/schemas/Party'
        buyer:
          $ref: '#/components/schemas/Party'
        assetDescription:
          type: string
        costPrice:
          type: number
        markup:
          type: number
          description: Marge bénéficiaire (montant fixe ou %)
        salePrice:
          type: number
        deferredPaymentPlan:
          type: array
          items:
            type: object
            properties:
              dueDate:
                type: string
                format: date
              amount:
                type: number

    Musawamah:
      type: object
      properties:
        id:
          type: string
        seller:
          $ref: '#/components/schemas/Party'
        buyer:
          $ref: '#/components/schemas/Party'
        negotiatedPrice:
          type: number
        assetDescription:
          type: string
        deliveryDate:
          type: string
          format: date

    Salam:
      type: object
      properties:
        id:
          type: string
        buyer:
          $ref: '#/components/schemas/Party'
        seller:
          $ref: '#/components/schemas/Party'
        commodity:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        totalPrice:
          type: number
        deliveryDate:
          type: string
          format: date

    Istisna:
      type: object
      properties:
        id:
          type: string
        manufacturer:
          $ref: '#/components/schemas/Party'
        purchaser:
          $ref: '#/components/schemas/Party'
        goodsSpecs:
          type: string
        price:
          type: number
        paymentSchedule:
          type: array
          items:
            type: object
            properties:
              milestone:
                type: string
              amount:
                type: number
        deliveryDate:
          type: string
          format: date

    BayAlSalam:
      allOf:
        - $ref: '#/components/schemas/Salam'
        - type: object
          properties:
            collateral:
              type: string

    BayAlIstisna:
      allOf:
        - $ref: '#/components/schemas/Istisna'
        - type: object
          properties:
            parallelContract:
              type: boolean
              description: Contrat parallèle pour le financement

    Arbun:
      type: object
      properties:
